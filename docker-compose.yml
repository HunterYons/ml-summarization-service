version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ml-summarization-service-db-1
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=summarization_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      default:
        ipv4_address: 172.18.0.5

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: ml-summarization-service-mlflow-1
    restart: always
    environment:
      - MLFLOW_HTTP_HOST_ALLOWLIST=*
      - MLFLOW_SERVER_HOST_HEADER_VALIDATION=false
    ports:
      - "5000:5000"
    networks:
      default:
        ipv4_address: 172.18.0.100
    command: >
      mlflow server 
      --host 0.0.0.0 
      --port 5000 
      --backend-store-uri sqlite:///mlflow.db 
      --default-artifact-root /app/artifacts
      --dev

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml-summarization-service-api-1
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      default:
        ipv4_address: 172.18.0.10

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml-summarization-service-bot-1
    depends_on:
      - api
    env_file:
      - .env
    networks:
      default:
        ipv4_address: 172.18.0.11
    command: python src/tg_bot.py

networks:
  default:
    ipam:
      config:
        - subnet: 172.18.0.0/16